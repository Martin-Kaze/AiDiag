<svg width="760" height="760" viewBox="0 0 760 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blockMint" x1="168" y1="176" x2="338" y2="345" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EF7D4"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>

    <linearGradient id="blockLavender" x1="430" y1="135" x2="590" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDD6FE"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>

    <linearGradient id="blockPearl" x1="258" y1="455" x2="430" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#CCFBF1"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>

    <linearGradient id="blockBlue" x1="470" y1="430" x2="630" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>

    <linearGradient id="glass" x1="275" y1="220" x2="505" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#EFFFFB" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>

    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 380) rotate(90) scale(315)">
      <stop stop-color="#2DD4BF" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="50" y="50" width="660" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.20"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="
        0 0 0 0 0.10
        0 0 0 0 0.95
        0 0 0 0 0.82
        0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Transparent-background hero decoration -->
  <circle cx="380" cy="380" r="335" fill="url(#aura)"/>

  <!-- Soft orbital motion lines -->
  <g opacity="0.68">
    <ellipse cx="380" cy="380" rx="278" ry="112" stroke="#14B8A6" stroke-width="2.2" stroke-opacity="0.34"/>
    <ellipse cx="380" cy="380" rx="278" ry="112" stroke="#8B5CF6" stroke-width="2.2" stroke-opacity="0.26" transform="rotate(56 380 380)"/>
    <ellipse cx="380" cy="380" rx="278" ry="112" stroke="#38BDF8" stroke-width="2.2" stroke-opacity="0.23" transform="rotate(-54 380 380)"/>
  </g>

  <!-- Abstract wellness AI block constellation -->
  <g filter="url(#shadow)">
    <!-- Main rounded block -->
    <g filter="url(#softGlow)">
      <rect x="286" y="260" width="188" height="188" rx="46" fill="url(#blockMint)"/>
      <rect x="315" y="289" width="130" height="130" rx="34" fill="#0F172A" fill-opacity="0.34"/>
      <path d="M354.5 369.6C374.3 395.4 396.6 395.4 415.5 369.6C434.4 343.8 414.8 308.3 385 326.2C355.2 308.3 334.7 343.8 354.5 369.6Z" fill="#F8FAFC" fill-opacity="0.95"/>
      <circle cx="385" cy="354" r="13" fill="#2DD4BF"/>
    </g>

    <!-- Top-left block -->
    <g transform="rotate(-14 210 242)" filter="url(#tinyShadow)">
      <rect x="154" y="186" width="112" height="112" rx="30" fill="url(#blockLavender)" opacity="0.96"/>
      <rect x="181" y="213" width="58" height="58" rx="18" fill="white" fill-opacity="0.24"/>
      <path d="M199 245C208 255 219 255 227 245" stroke="#0F172A" stroke-opacity="0.42" stroke-width="7" stroke-linecap="round"/>
    </g>

    <!-- Top-right block -->
    <g transform="rotate(17 544 220)" filter="url(#tinyShadow)">
      <rect x="496" y="172" width="96" height="96" rx="28" fill="url(#blockPearl)" opacity="0.95"/>
      <circle cx="544" cy="220" r="24" fill="#0F172A" fill-opacity="0.16"/>
      <circle cx="544" cy="220" r="9" fill="#14B8A6"/>
    </g>

    <!-- Bottom-left block -->
    <g transform="rotate(19 275 538)" filter="url(#tinyShadow)">
      <rect x="221" y="484" width="108" height="108" rx="31" fill="url(#blockPearl)" opacity="0.9"/>
      <path d="M253 538H297" stroke="#0F172A" stroke-opacity="0.30" stroke-width="8" stroke-linecap="round"/>
      <path d="M275 516V560" stroke="#0F172A" stroke-opacity="0.30" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- Bottom-right block -->
    <g transform="rotate(-18 550 520)" filter="url(#tinyShadow)">
      <rect x="494" y="464" width="112" height="112" rx="32" fill="url(#blockBlue)" opacity="0.9"/>
      <path d="M528 533C538 510 563 510 573 533" stroke="#F8FAFC" stroke-opacity="0.9" stroke-width="8" stroke-linecap="round"/>
      <circle cx="532" cy="502" r="7" fill="#F8FAFC"/>
      <circle cx="568" cy="502" r="7" fill="#F8FAFC"/>
    </g>

    <!-- Small floating glass chips -->
    <rect x="114" y="388" width="54" height="54" rx="18" fill="url(#glass)" opacity="0.58" transform="rotate(-22 141 415)"/>
    <rect x="602" y="344" width="62" height="62" rx="20" fill="url(#glass)" opacity="0.52" transform="rotate(21 633 375)"/>
    <rect x="409" y="112" width="45" height="45" rx="15" fill="url(#glass)" opacity="0.45" transform="rotate(-8 431.5 134.5)"/>
    <rect x="398" y="616" width="48" height="48" rx="16" fill="url(#glass)" opacity="0.42" transform="rotate(16 422 640)"/>
  </g>

  <!-- Neural connection curves -->
  <g stroke-linecap="round" fill="none">
    <path d="M265 252C302 248 323 261 340 283" stroke="#14B8A6" stroke-width="4" stroke-opacity="0.38"/>
    <path d="M476 294C493 260 512 239 533 226" stroke="#8B5CF6" stroke-width="4" stroke-opacity="0.32"/>
    <path d="M344 436C319 472 296 499 281 522" stroke="#14B8A6" stroke-width="4" stroke-opacity="0.28"/>
    <path d="M457 428C487 466 515 493 540 509" stroke="#38BDF8" stroke-width="4" stroke-opacity="0.28"/>
  </g>

  <!-- Floating insight pills, no text so it stays universal -->
  <g filter="url(#tinyShadow)">
    <rect x="82" y="314" width="148" height="58" rx="29" fill="white" fill-opacity="0.74"/>
    <circle cx="116" cy="343" r="14" fill="#FCA5A5"/>
    <path d="M106 343C113 354 121 354 128 343" stroke="#7F1D1D" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
    <rect x="141" y="329" width="58" height="8" rx="4" fill="#0F172A" fill-opacity="0.16"/>
    <rect x="141" y="348" width="38" height="7" rx="3.5" fill="#0F172A" fill-opacity="0.10"/>
  </g>

  <g filter="url(#tinyShadow)">
    <rect x="535" y="590" width="158" height="60" rx="30" fill="white" fill-opacity="0.76"/>
    <circle cx="571" cy="620" r="14" fill="#BFDBFE"/>
    <path d="M564 621C568 612 575 612 579 621" stroke="#1E3A8A" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
    <rect x="597" y="606" width="65" height="8" rx="4" fill="#0F172A" fill-opacity="0.16"/>
    <rect x="597" y="626" width="42" height="7" rx="3.5" fill="#0F172A" fill-opacity="0.10"/>
  </g>

  <!-- tiny particles -->
  <g opacity="0.72">
    <circle cx="174" cy="151" r="5" fill="#2DD4BF"/>
    <circle cx="613" cy="145" r="4" fill="#8B5CF6"/>
    <circle cx="670" cy="458" r="4.5" fill="#38BDF8"/>
    <circle cx="177" cy="617" r="4" fill="#14B8A6"/>
    <circle cx="322" cy="112" r="3.5" fill="#CBD5E1"/>
    <circle cx="626" cy="276" r="3" fill="#2DD4BF"/>
    <circle cx="111" cy="482" r="3.5" fill="#A78BFA"/>
  </g>
</svg>